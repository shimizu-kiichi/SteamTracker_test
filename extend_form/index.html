<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>延長申請フォーム</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      margin: 0;
      padding: 8px;
      background-color: #f5f5f5;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      font-size: 1.6em;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 24px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 90%;
      margin: 40px auto;
    }

    h1 {
      font-size: 1.5em;
      text-align: center;
      margin-bottom: 18px;
      letter-spacing: 0.02em;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
      font-size: 1.3em;
      letter-spacing: 0.01em;
    }

    input, select {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 5px;
      font-size: 1.4em;
      box-sizing: border-box;
      background: #fafcff;
    }

    button {
      margin-top: 18px;
      width: 100%;
      background-color: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 13px 0;
      font-size: 1.4em;
      font-weight: bold;
      letter-spacing: 0.04em;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: background 0.2s;
    }

    button:active {
      background-color: #005ecb;
    }

    .hidden {
      display: none;
    }

    .item-block {
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .item-image {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      border-radius: 8px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5em;
      }
      label {
        font-size: 1.35em;
      }
      input, select {
        font-size: 1.35em;
        padding: 20px 16px;
      }
      button {
        font-size: 1.4em;
        padding: 22px 0;
      }
    }

  </style>
</head>
<body>
  <div class="container" id="loginView">
    <h1>延長申請ログイン</h1>
    <label for="email">学籍番号</label>
    <!-- <label for="email">メールアドレス</label> -->
    <input type="email" id="email" placeholder="y200000">
    <!-- <input type="email" id="email" value="<?!= email ?>" readonly> -->
    <button onclick="submitEmail()">次へ</button>
  </div>

  <div class="container hidden" id="formView">
    <h1>延長申請フォーム</h1>
    <div id="itemList"></div>
    <button onclick="submitForm()">申請する</button>
  </div>

  <div class="container hidden" id="doneView">
    <h1>申請を受け付けました</h1>
    <p>申請内容を確認後、メールにて通知いたします。</p>
  </div>

  <script>
    // メールアドレスを検証してフォームを表示
    function submitEmail() {
      let email = document.getElementById('email').value.trim();
      email += "@mail.ryukoku.ac.jp";
      // if (!email.endsWith('@mail.ryukoku.ac.jp') || email.length < 20) {
      //   alert('入力形式が正しくありません。龍谷大学のメールアドレスを使用してください。');
      //   return;
      // }
      google.script.run
        .withSuccessHandler(showForm)
        .getItemsByEmail(email);
    }

    // 物品リスト表示
    function showForm(items) {
      // console.log(items);
      if (!items || items.length === 0) {
        alert('該当する物品が見つかりません');
        return;
      }
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('formView').classList.remove('hidden');

      const listContainer = document.getElementById('itemList');
      listContainer.innerHTML = '';
      
      items.forEach(item => {
        // Calculate tomorrow's date in yyyy-MM-dd format (Asia/Tokyo)
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        // Format as yyyy-MM-dd
        const pad = n => n < 10 ? '0' + n : n;
        const minDate = tomorrow.getFullYear() + '-' + pad(tomorrow.getMonth() + 1) + '-' + pad(tomorrow.getDate());

        const itemBlock = document.createElement('div');
        itemBlock.className = 'item-block';

        const label = document.createElement('label');
        label.textContent = `${item.organ} - ${item.name}`;

        const input = document.createElement('input');
        input.type = 'date';
        input.id = `date-${item.id}`;
        input.max = item.maxDate;
        input.min = minDate;
        input.value = item.handover;

        const img = document.createElement('img');
        img.src = item.image;
        img.alt = 'image';
        img.className = 'item-image';

        itemBlock.appendChild(label);
        itemBlock.appendChild(input);
        itemBlock.appendChild(img);
        listContainer.appendChild(itemBlock);
      });

    }

    // 申請内容送信
    function submitForm() {
      const submitButton = document.querySelector('#formView button');
      submitButton.disabled = true;

      // すべての日付入力を取得
      const dateInputs = document.querySelectorAll('#itemList input[type="date"]');
      let results = [];

      dateInputs.forEach(input => {
        // console.log(`input`);
        // console.log(input);
        const id = input.id.replace('date-', '');
        const newDate = input.value;

        results.push({
          id: Number(id),
          newDate: newDate
        });
      });

      const hasEmpty = results.some(r => !r.newDate);
      if (hasEmpty) {
        alert('すべての日付を入力してください');
        submitButton.disabled = false;
        return;
      }

      // console.log(`pushed:`);
      // console.log(results);
      
      google.script.run
        .withSuccessHandler(() => {
          document.getElementById('formView').classList.add('hidden');
          document.getElementById('doneView').classList.remove('hidden');
          submitButton.disabled = false;
        })
        .withFailureHandler(() => {
          alert('申請送信に失敗しました。再度お試しください。');
          submitButton.disabled = false;
        })
        .notifyExtensionRequest(results);
    }

  </script>
</body>
</html>

/* Extracted from index.html inline <style>
  and moved here for GAS include() */

/* Design tokens (colors, spacing, typography, layout) */
:root {
--primary: #10b981;
/* emerald-500 */
--primary-600: #059669;
/* emerald-600 */
--primary-100: #d1fae5;
/* light emerald */
--surface: #FFF1D0;
/* requested washi-like cream (updated) */
--card: #ffffff;
/* solid white card for clear edge */
--border: rgba(0, 0, 0, 0.20);
--table-border: #a89970;
/* warm border color fits washi */
--table-grid: rgba(0, 0, 0, 0.20);
--text: #1f2937;
/* slate-800 */
--muted: #6b7280;
/* gray-500 */
--row-alt: rgba(16, 185, 129, 0.04);
--row-hover: rgba(16, 185, 129, 0.08);
--row-selected: rgba(16, 185, 129, 0.16);
--thead-bg: rgba(16, 185, 129, 0.15);
--thead-bg-muted: #f2f2f2;

/* UI states and accents */
--focus-ring: #99ccff;
--tooltip-bg: #333333;
--tooltip-fg: #ffffff;

/* Semantic colors (for optional use) */
--success: #4CAF50;
--success-hover: #45a049;
--warning: #ff9800;
--warning-hover: #e68900;
--danger: #f44336;
--danger-hover: #da190b;

--radius: 10px;
--shadow-sm: 0 10px 30px rgba(0, 0, 0, 0.08);
--shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.08);
--glass-blur: 8px;

/* 列幅のトークン（必要に応じて数値を変えるだけでOK） */
--col-check-width: 3ch;
--col-name-width: 6ch;
--col-organization-width: 6ch;
--col-photo-width: 8ch;
--col-photo-height: 10ch;
--col-handover_on-width: 4ch;
--col-status-width: 2ch;
--col-admin_note-width: 10ch;

/* Font size tokens */
--fs-sm: 12px;
--fs-md: 20px;
--fs-lg: 27px;
}

/* Responsive width tokens */
@media (max-width: 1280px) {
:root {
--col-name-width: 16ch;
--col-organization-width: 12ch;
--col-handover_on-width: 10ch;
--col-status-width: 9ch;
--col-admin_note-width: 20ch;
}
}

@media (max-width: 960px) {
:root {
--col-name-width: 14ch;
--col-organization-width: 10ch;
--col-handover_on-width: 20ch;
--col-status-width: 8ch;
--col-admin_note-width: 18ch;
}
}

html,
body {
background-color: var(--surface);
background-image:
radial-gradient(rgba(0, 0, 0, 0.025) 0.5px, transparent 0.6px),
radial-gradient(rgba(0, 0, 0, 0.02) 0.5px, transparent 0.6px),
repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.02) 0, rgba(0, 0, 0, 0.02) 2px, transparent 2px, transparent 6px),
repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.015) 0, rgba(0, 0, 0, 0.015) 1.5px, transparent 1.5px, transparent
5px);
background-size: 22px 22px, 28px 28px, 180px 180px, 200px 200px;
background-position: 0 0, 8px 8px, 0 0, 0 0;
color: var(--text);
font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo,
sans-serif;
line-height: 1.6;
}

/* Sheet title (管理シート / アーカイブシート) */
.sheet-title {
font-size: 1.8rem;
font-weight: bold;
color: var(--text);
margin: 16px 12px 12px;
padding-left: 12px;
border-left: 4px solid var(--primary);
}

/* Header bar */
.header-container {
display: flex;
justify-content: space-between;
align-items: center;
margin: 10px 8px;
padding: 8px 10px;
background: var(--card);
border: 1px solid var(--border);
border-left: 6px solid var(--primary);
border-radius: var(--radius);
box-shadow: var(--shadow-sm);
backdrop-filter: blur(var(--glass-blur));
-webkit-backdrop-filter: blur(var(--glass-blur));
gap: 8px;
}

.title-group {
display: flex;
flex-direction: column;
gap: 2px;
}

.app-title {
margin: 0;
font-size: 26px;
font-weight: 800;
letter-spacing: .2px;
background: linear-gradient(90deg, var(--primary-600), var(--primary));
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

.app-subtitle {
margin: 0;
font-size: 12px;
color: var(--muted);
}

.controls {
display: flex;
align-items: center;
gap: 10px;
}

.button-left,
.button-group {
display: flex;
gap: 8px;
}

.button-left button,
.button-group button {
padding: 8px 16px;
font-size: 14px;
cursor: pointer;
border: 1px solid var(--border);
border-radius: var(--radius);
transition: background-color .15s ease, color .15s ease, border-color .15s ease, transform .02s ease;
}

.button-left button {
background-color: var(--primary);
border-color: var(--primary);
color: #fff;
}

.button-left button:hover {
background-color: var(--primary-600);
}

.button-left button:active,
.button-group button:active {
transform: translateY(1px);
}

.button-left button:focus-visible,
.button-group button:focus-visible {
outline: 3px solid var(--focus-ring);
outline-offset: 2px;
}

.button-group button {
background-color: var(--card);
color: var(--text);
}

.button-group button:first-child {
background-color: var(--success);
color: #fff;
border-color: var(--success);
}

.button-group button:first-child:hover {
background-color: var(--success-hover);
}

.button-group button:nth-child(2) {
background-color: var(--warning);
color: #fff;
border-color: var(--warning);
}

.button-group button:nth-child(2):hover {
background-color: var(--warning-hover);
}

.button-group button:last-child {
background-color: var(--danger);
color: #fff;
border-color: var(--danger);
}

.button-group button:last-child:hover {
background-color: var(--danger-hover);
}

/* Table */
table {
border-collapse: collapse;
width: 100%;
margin-top: 20px;
border-spacing: 0;
table-layout: fixed;
background: var(--card);
border: 2px solid var(--table-border);
border-radius: var(--radius);
overflow: hidden;
box-shadow: var(--shadow-md);
}

th,
td {
border: 1px solid var(--border);
padding: 8px;
text-align: left;
letter-spacing: 0;
word-spacing: 0;
color: var(--text);
}

th {
background-color: var(--thead-bg);
color: var(--primary-600);
position: sticky;
top: 0;
z-index: 1;
backdrop-filter: blur(6px);
}

tr:nth-child(even) {
background-color: var(--row-alt);
}

tbody tr:hover {
background-color: var(--row-hover);
}

/* Selected row (modern highlight) */
tbody tr:has(input[type="checkbox"]:checked) {
background-color: var(--row-selected);
outline: 2px solid rgba(16, 185, 129, 0.35);
outline-offset: -2px;
}

/* Checkbox */
table input[type="checkbox"] {
transform: scale(3.5);
transform-origin: center;
margin: 5px 6px 2px 6px;
accent-color: var(--primary);
}

thead th:first-child,
tbody td:first-child,
th.col-check,
td.col-check {
min-width: 56px;
text-align: center;
}

thead th.col-name,
tbody td.col-name {
white-space: nowrap;
}

thead th.col-photo,
tbody td.col-photo {
text-align: center;
}

thead th.col-handover_on,
tbody td.col-handover_on {
white-space: nowrap;
}

tbody td.col-handover_on {
overflow: hidden;
text-overflow: ellipsis;
}

/* 狭幅でも省略が効くよう header/cell に共通の挙動を付与 */
thead th.col-handover_on,
tbody td.col-handover_on {
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

/* 複数列まとめて中央寄せ */
thead th.col-handover_on,
tbody td.col-handover_on,
thead th.col-status,
tbody td.col-status,
thead th.col-name,
tbody td.col-name,
thead th.col-organization,
tbody td.col-organization {
text-align: center;
}

/* 写真セルと画像のスタイル */
tbody td.col-photo {
padding: 0;
width: var(--col-photo-width);
min-width: var(--col-photo-width);
max-width: var(--col-photo-width);
height: var(--col-photo-height);
min-height: var(--col-photo-height);
max-height: var(--col-photo-height);
position: relative;
overflow: hidden;
}

tbody td.col-photo img {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: contain;
border-radius: 6px;
}

table col.col-check {
width: var(--col-check-width);
}

table col.col-name {
width: var(--col-name-width);
}

table col.col-organization {
width: var(--col-organization-width);
}

table col.col-photo {
width: var(--col-photo-width);
}

table col.col-handover_on {
width: var(--col-handover_on-width);
}

table col.col-status {
width: var(--col-status-width);
}

table col.col-admin_note {
width: var(--col-admin_note-width);
}

/* Tooltip */
td[data-email] {
position: relative;
cursor: pointer;
}

td[data-email]:hover::after,
td[data-email]:focus-visible::after {
content: attr(data-email);
position: absolute;
bottom: 100%;
left: 50%;
transform: translateX(-50%);
background-color: var(--tooltip-bg);
color: var(--tooltip-fg);
border-radius: 4px;
z-index: 1000;
box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
font-size: 25px;
line-height: 1.5;
padding: 10px 14px;
max-width: 900px;
white-space: normal;
letter-spacing: 0;
word-spacing: 0;
}

td[data-email]:hover::before,
td[data-email]:focus-visible::before {
content: '';
position: absolute;
bottom: calc(100% - 2px);
left: 50%;
transform: translateX(-50%);
border: 7px solid transparent;
border-top-color: var(--tooltip-bg);
z-index: 1000;
}

/* Narrow screen */
@media (max-width:960px) {
table {
display: block;
overflow-x: auto;
white-space: nowrap;
}

th,
td {
white-space: nowrap;
}
}

/* Dark mode */
@media (prefers-color-scheme: dark) {
:root {
--surface: #0f1314;
--card: #121a1a;
--border: #223232;
--text: #e5e7eb;
--row-alt: #0f1717;
--row-hover: #142020;
--row-selected: #102525;
}
}
/* ================= Font sizing & column tweaks (added) ================= */

thead th {
font-size: var(--fs-lg);
}

tbody td {
font-size: var(--fs-lg);
}

/* 列ごと細かい調整 */

thead th.col-name,
thead th.col-check,
thead th.col-organization,
thead th.col-photo,
thead th.col-handover_on,
thead th.col-status,
thead th.col-admin_note {
font-size: var(--fs-lg);
}

tbody td.col-check,
tbody td.col-name,
tbody td.col-organization,
tbody td.col-photo,
tbody td.col-handover_on,
tbody td.col-status,
tbody td.col-admin_note {
font-size: var(--fs-md);
}

tbody td.col-handover_on {
line-height: 1.3;
}

tbody td.col-admin_note {
line-height: 1.4;
}

/* ================= Archive view styling ================= */
#archiveView {
  --archive-accent: #f59e0b;
  --archive-accent-dark: #d97706;
}

#archiveView table {
  border-color: #d97706;
}

#archiveView thead th {
  background-color: rgba(245, 158, 11, 0.15);
  color: #92400e;
}

#archiveView tbody tr:nth-child(even) {
  background-color: rgba(245, 158, 11, 0.04);
}

#archiveView tbody tr:hover {
  background-color: rgba(245, 158, 11, 0.08);
}

#archiveView tbody tr:has(input[type="checkbox"]:checked) {
  background-color: rgba(245, 158, 11, 0.16);
  outline-color: rgba(245, 158, 11, 0.35);
}

#archiveView table input[type="checkbox"] {
  accent-color: #f59e0b;
}

/* Archive view button styles */
#archiveView .button-group button:first-child {
  background-color: var(--primary);
  border-color: var(--primary);
}

#archiveView .button-group button:first-child:hover {
  background-color: var(--primary-600);
}

/* Dark mode adjustments for archive view */
@media (prefers-color-scheme: dark) {
  #archiveView thead th {
    background-color: rgba(245, 158, 11, 0.2);
    color: #fbbf24;
  }
}

name: Teams Notification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Notify to Teams via webhook
              run: | 
                curl -H "Content-Type: application/json" -d '{
                    "type": "message",
                    "attachments": [
                        {
                            "contentType": "application/vnd.microsoft.card.adaptive",
                            "contentUrl": null,
                            "content": {
                                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                                "type": "AdaptiveCard",
                                "version": "1.2",
                                "body": [
                                    {
                                        "type": "TextBlock",
                                        "size": "Large",
                                        "weight": "Bolder",
                                        "text": "🚀 GitHub Actions 通知"
                                    },
                                    {
                                        "type": "FactSet",
                                        "facts": [
                                            { "title": "リポジトリ", "value": "${{ github.repository }}" },
                                            { "title": "ブランチ", "value": "${{ github.ref_name }}" },
                                            { "title": "イベント", "value": "${{ github.event_name }}" },
                                            { "title": "実行者", "value": "${{ github.actor }}" }
                                        ]
                                    },
                                    {
                                        "type": "TextBlock",
                                        "text": "ステータス:",
                                        "weight": "Bolder",
                                        "spacing": "Medium"
                                    },
                                    {
                                        "type": "TextBlock",
                                        "text": "${{ job.status }}",
                                        "wrap": true
                                    },
                                    {
                                        "type": "TextBlock",
                                        "text": "コミットメッセージ:",
                                        "weight": "Bolder",
                                        "spacing": "Medium"
                                    },
                                    {
                                        "type": "TextBlock",
                                        "text": "${{ github.event.head_commit.message }}",
                                        "wrap": true
                                    },
                                    {
                                        "type": "ActionSet",
                                        "actions": [
                                            {
                                                "type": "Action.OpenUrl",
                                                "title": "GitHubで確認",
                                                "url": "https://github.com/${{ github.repository }}/commit/${{ github.event.head_commit.id }}"
                                            }
                                        ]
                                    }
                                ]
                            }
                        }
                    ]
                }' "${{ secrets.TEAMS_WEBHOOK }}"
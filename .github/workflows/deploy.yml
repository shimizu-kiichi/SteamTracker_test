name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Replace placeholder with secret
        run: |
          sed -i "s|%%EXTEND_GAS_URL%%|${{ secrets.EXTEND_GAS_URL }}|g" extend_form/index.html
          sed -i "s|%%STUFF_GAS_URL%%|${{ secrets.STUFF_GAS_URL }}|g" stuffForm/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
